concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
name: tsan
on:
  pull_request:
  push:
    branches: [ main ]
jobs:
  tsan:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Configure (Clang + TSan)
        run: CC=clang CXX=clang++ cmake -S . -B build-tsan -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_CXX_FLAGS="-fsanitize=thread -fno-omit-frame-pointer" -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=thread"
      - name: Build
        run: cmake --build build-tsan -j
      - name: Test
        env:
          TSAN_OPTIONS: "halt_on_error=1"
        run: ctest --test-dir build-tsan --output-on-failure
