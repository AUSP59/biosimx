concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
name: reproducible-check
on: [pull_request, workflow_dispatch]
jobs:
  repro:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Build #1
        env: { SOURCE_DATE_EPOCH: "1" }
        run: cmake -S . -B b1 -DCMAKE_BUILD_TYPE=Release && cmake --build b1 -j
      - name: Build #2
        env: { SOURCE_DATE_EPOCH: "1" }
        run: cmake -S . -B b2 -DCMAKE_BUILD_TYPE=Release && cmake --build b2 -j
      - name: Compare (best-effort)
        run: |
          if [ -d b1/bin ] && [ -d b2/bin ]; then
            for f in $(ls b1/bin); do [ -f "b2/bin/$f" ] && sha1sum "b1/bin/$f" "b2/bin/$f"; done
          fi
