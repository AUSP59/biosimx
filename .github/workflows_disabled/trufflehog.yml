concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
name: trufflehog
on: [push, pull_request]
jobs:
  trufflehog:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: trufflesecurity/trufflehog@v3.81.6
        with:
          path: .
          base: false
          extra_args: --no-update
