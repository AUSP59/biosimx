concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
name: changelog-enforcer
on:
  pull_request:
    types: [opened, synchronize]
jobs:
  enforce:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - run: python3 tools/check_changelog.py
