concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
name: cross-compile
on: [push, pull_request]
jobs:
  aarch64-linux-gnu:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Install cross toolchain
        run: sudo apt-get update && sudo apt-get install -y g++-aarch64-linux-gnu
      - name: Configure
        run: cmake -S . -B build-aarch64 -DCMAKE_TOOLCHAIN_FILE=cmake/toolchains/aarch64-linux-gnu.cmake -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build-aarch64 -j
  mingw-w64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mingw
        run: sudo apt-get update && sudo apt-get install -y g++-mingw-w64-x86-64
      - name: Configure
        run: cmake -S . -B build-mingw -DCMAKE_TOOLCHAIN_FILE=cmake/toolchains/mingw-w64.cmake -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build-mingw -j
