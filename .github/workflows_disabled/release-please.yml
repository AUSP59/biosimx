concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

name: release-please
on:
  workflow_dispatch:

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: google-github-actions/release-please-action@v4
        with:
          release-type: simple
