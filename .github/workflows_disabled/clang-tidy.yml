concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

name: clang-tidy
on:
  pull_request:
  push:
    branches: [ main ]
jobs:
  tidy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-tidy
        run: sudo apt-get update && sudo apt-get install -y clang-tidy cmake ninja-build
      - name: Configure (export compile_commands)
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
      - name: Run clang-tidy
        run: clang-tidy -p build $(git ls-files '*.cpp' '*.cc' | tr '\n' ' ')
