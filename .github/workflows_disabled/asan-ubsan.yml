concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
name: asan-ubsan
on:
  pull_request:
  push:
    branches: [ main ]
jobs:
  asan:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build-asan -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer" -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"
      - name: Build
        run: cmake --build build-asan -j
      - name: Test
        env:
          ASAN_OPTIONS: "strict_string_checks=1:detect_leaks=1:check_initialization_order=1"
          UBSAN_OPTIONS: "print_stacktrace=1"
        run: ctest --test-dir build-asan --output-on-failure
