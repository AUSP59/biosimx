concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
name: dco
on:
  pull_request:
    types: [opened, synchronize, edited, reopened]
jobs:
  dco:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Enforce DCO sign-off
        run: python3 tools/check_dco.py
